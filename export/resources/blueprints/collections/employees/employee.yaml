title: Employee
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: name
            field:
              type: text
              display: Name
          -
            handle: profile_image
            field:
              container: assets
              type: assets
              display: 'Profile image'
          -
            handle: text
            field:
              buttons:
                - bold
                - italic
                - removeformat
                - anchor
              toolbar_mode: floating
              container: assets
              remove_empty_nodes: false
              type: bard
              display: Text
          -
            handle: email
            field:
              input_type: email
              type: text
              display: Email
          -
            handle: phone
            field:
              input_type: tel
              type: text
              display: Phone
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: hidden
              required: false
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
