title: Event
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: main_content
            field: common.main_content
          -
            handle: spacing_field
            field:
              max: 6
              type: spacing
              display: 'Spacing Field'
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: date
            field:
              type: date
              required: true
              default: now
              validate:
                - required
          -
            handle: featured_media
            field:
              container: assets
              max_files: 1
              type: assets
              display: 'Featured media'
          -
            handle: author
            field:
              type: users
              display: Author
              default: current
              localizable: true
              max_items: 1
