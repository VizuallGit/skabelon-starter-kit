title: Common
fields:
  -
    handle: spacing
    field:
      max: 6
      type: spacing
      display: Spacing
  -
    handle: font_weight
    field:
      options:
        -
          key: 300
          value: Light
        -
          key: 400
          value: Regular
        -
          key: 500
          value: Medium
        -
          key: 600
          value: Semibold
        -
          key: 700
          value: Bold
        -
          key: 800
          value: 'Extra bold'
      default: '400'
      type: select
      display: 'Font weight'
  -
    handle: line_height
    field:
      options:
        -
          key: leading-none
          value: 1%
        -
          key: leading-flat
          value: 1.15%
        -
          key: leading-tight
          value: 1.25%
        -
          key: leading-snug
          value: 1.375%
        -
          key: leading-normal
          value: '1.5'
        -
          key: leading-relaxed
          value: 1.625%
        -
          key: leading-loose
          value: 2%
      default: leading-normal
      type: select
      display: 'Line height'
  -
    handle: position
    field:
      options:
        -
          key: relative
          value: Normal
        -
          key: fixed
          value: Fixed
        -
          key: sticky
          value: Sticky
      type: button_group
      display: Position
      default: relative
  -
    handle: font_family
    field:
      type: font_family_selector
      display: 'Font family'
  -
    handle: opacity
    field:
      options:
        -
          key: 0%
          value: 0%
        -
          key: 10%
          value: 10%
        -
          key: 20%
          value: 20%
        -
          key: 30%
          value: 30%
        -
          key: 40%
          value: 40%
        -
          key: 50%
          value: 50%
        -
          key: 60%
          value: 60%
        -
          key: 70%
          value: 70%
        -
          key: 80%
          value: 80%
        -
          key: 90%
          value: 90%
        -
          key: 100%
          value: 100%
      type: select
      display: Opacity
      default: 50%
  -
    handle: aspect_ratio
    field:
      options:
        -
          key: aspect-1/1
          value: '1/1 - Firekantet'
        -
          key: aspect-4/3
          value: 4/3
        -
          key: aspect-16/9
          value: '16/9 - Video format'
        -
          key: aspect-3/4
          value: 3/4
      default: aspect-4/3
      type: select
      display: 'Aspect ratio'
  -
    handle: offset
    field:
      options:
        -
          key: none
          value: None
        -
          key: sm
          value: Small
        -
          key: md
          value: Medium
        -
          key: lg
          value: Large
      default: none
      type: select
      display: Offset
  -
    handle: simple_text
    field:
      buttons:
        - bts_styles
        - h1
        - h2
        - h3
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - removeformat
        - anchor
        - horizontalrule
        - text_100
        - text_200
        - text_300
        - text_400
        - text_500
        - text_600
        - text_700
        - text_800
        - text_900
        - color
      container: assets
      remove_empty_nodes: false
      bts_styles:
        - text_100
        - text_200
        - text_300
        - text_400
        - text_500
        - text_600
        - text_700
        - text_800
        - text_900
      type: bard
      display: 'Simple text'
  -
    handle: section_heading
    field:
      buttons:
        - bts_styles
        - h2
        - h3
        - bold
        - italic
        - removeformat
        - quote
        - anchor
        - text_100
        - text_200
        - text_300
        - text_400
        - text_500
        - text_600
        - text_700
        - text_800
        - text_900
        - color
      container: assets
      remove_empty_nodes: false
      bts_styles:
        - text_100
        - text_200
        - text_300
        - text_400
        - text_500
        - text_600
        - text_700
        - text_800
        - text_900
      type: bard
      display: 'Section heading'
  -
    handle: section_spacing
    field:
      max: 12
      step: 3
      type: spacing
      display: 'Section spacing'
  -
    handle: main_content
    field:
      buttons:
        - bts_styles
        - h1
        - h2
        - h3
        - h4
        - bold
        - italic
        - unorderedlist
        - orderedlist
        - removeformat
        - quote
        - anchor
        - image
        - table
        - text_100
        - text_200
        - text_300
        - text_400
        - text_500
        - text_600
        - text_700
        - text_800
        - text_900
        - color
      container: assets
      remove_empty_nodes: false
      bts_styles:
        - text_100
        - text_200
        - text_300
        - text_400
        - text_500
        - text_600
        - text_700
        - text_800
        - text_900
      type: bard
      display: 'Main content'
